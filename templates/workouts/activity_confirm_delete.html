{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .confirm-card {
    background: rgba(255,255,255,0.93);
    border-radius: 12px;
    padding: 40px 36px;
    width: 380px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    text-align: center;
  }

  .confirm-card h2 {
    margin: 0 0 8px 0;
    font-size: 22px;
    color: #111;
  }

  .confirm-card p {
    font-size: 15px;
    color: #555;
    margin-bottom: 28px;
  }

  .confirm-card .name-highlight {
    font-weight: 700;
    color: #111;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .cancel-btn {
    flex: 1;
    padding: 10px;
    background: rgba(0,0,0,0.07);
    color: #333;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }
  .cancel-btn:hover { background: rgba(0,0,0,0.12); }

  .delete-btn {
    flex: 1;
    padding: 10px;
    background: #b00020;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .delete-btn:hover { opacity: 0.88; }
</style>

<div class="confirm-card">
  <h2>Delete Activity</h2>
  <p>
    Are you sure you want to delete
    <span class="name-highlight">{{ activity.name_of_activity|default:activity.activity_type }}</span>
    from <span class="name-highlight">{{ activity.daily_log.date|date:"F j, Y" }}</span>?
  </p>

  <div class="btn-row">
    <a class="cancel-btn" href="{% url 'logs' %}">Cancel</a>
    <form method="post" style="flex:1; margin:0;">
      {% csrf_token %}
      <button type="submit" class="delete-btn" style="width:100%;">Yes, delete</button>
    </form>
  </div>
</div>

{% endblock %}
